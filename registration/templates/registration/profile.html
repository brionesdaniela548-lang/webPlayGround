{% extends 'core/base.html' %}
{% load static %}

{% block title %}Perfil{% endblock %}

{% block content %}

<main role="main">
    <div class="container">
        <div class="row mt-3">
            <div class="col-md-8 mx-auto">

                <h2 class="text-center">Perfil de usuario</h2>

                <table class="table">
                    <tr>
                        <th>Usuario</th>
                        <td>{{ user.username }}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{ user.email }}</td>
                    </tr>
                </table>

                <div class="text-center">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            Cerrar sesión
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</main>

{% endblock %}
